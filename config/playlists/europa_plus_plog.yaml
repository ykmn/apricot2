id: europa_plus_plog
name: "Europa Plus — Плейлог"

smb:
  host: "playout.domain.local"
  share: "logs"
  path: "europa_plus/playlogs"
  username: "svc_radio"
  password_env: "PLAYOUT_PASSWORD"
  domain: "CORP"

file_mask: "%Y-%m-%d.csv"
encoding: "utf-8-sig"
delimiter: ","

fields:
  date: "AirDate"
  time: "AirTime"
  title: "ElementTitle"
  cls: "ElementClass"
  duration: "DurationSec"

class_colors:
  M: "#f48fb1"
  J: "#90caf9"
  A: "#ffcc80"
  P: "#a5d6a7"
  default: "#e0e0e0"

class_names:
  M: "Музыка"
  J: "Джингл"
  A: "Реклама"
  P: "Передача"

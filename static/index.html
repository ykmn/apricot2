<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Абрикос 2</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/apricot.svg" sizes="any" type="image/svg+xml">

</head>
<body>
<div id="app">

  <!-- ── Top bar (строка 1: лого + меню) ─────────────────────────── -->
  <div id="topbar">
    <div id="app-brand">
      <a id="app-brand-link" href="/">
        <img src="/static/apricot.svg" width="64" height="64" alt="">
        <span id="app-name" data-i18n="app.title">Абрикос 2</span>
      </a>
    </div>
    <div id="hamburger-wrap">
      <button id="btn-hamburger" data-i18n-title="menu.hamburger_title" title="Меню">☰</button>
      <div id="hamburger-menu" class="hidden">
        <button class="menu-item" id="menu-theme" data-i18n="menu.theme_light">☀️ Светлый режим</button>
        <div class="menu-sep"></div>
        <div class="menu-lang-row">
          <span class="menu-lang-label" data-i18n="menu.language">🌐 Язык</span>
          <div class="menu-lang-btns">
            <button class="menu-lang-btn" data-lang="ru">RU</button>
            <button class="menu-lang-btn" data-lang="en">EN</button>
            <button class="menu-lang-btn" data-lang="fr">FR</button>
          </div>
        </div>
        <div class="menu-sep" data-admin-only></div>
        <button class="menu-item" id="menu-rescan"          data-admin-only data-i18n="menu.rescan_channel">🔍 Пересканировать текущий канал</button>
        <button class="menu-item" id="menu-rescan-playlogs" data-admin-only data-i18n="menu.rescan_playlogs">📋 Пересканировать плейлоги станции</button>
        <div class="menu-sep" data-admin-only></div>
        <button class="menu-item" id="menu-reload"  data-admin-only data-i18n="menu.reload_config">🔄 Обновить конфигурацию</button>
        <div class="menu-sep" data-admin-only></div>
        <button class="menu-item" id="menu-restart" data-admin-only data-i18n="menu.restart_server">🔁 Перезапустить сервер</button>
        <div class="menu-sep"></div>
        <span class="menu-version" id="menu-ver">v…</span>
        <div class="menu-sep hidden" id="menu-sep-logout"></div>
        <div class="menu-userinfo hidden" id="menu-userinfo"></div>
        <button class="menu-item menu-item-danger hidden" id="menu-logout" data-i18n="menu.logout">🚪 Выйти</button>
      </div>
    </div>
  </div>

  <!-- ── Channel bar (строка 2: канал + фильтр + часы) ────────────── -->
  <div id="channel-bar">
    <div id="channel-label" data-i18n="channel.select_prompt">Выберите канал ⬇️</div>
    <div id="channel-controls">
      <div id="channel-selector-wrap">
        <input id="channel-search" type="text" data-i18n-ph="channel.filter_placeholder" placeholder="Фильтр…" autocomplete="off">
        <div id="channel-dropdown" class="dropdown hidden"></div>
      </div>
      <button id="channel-list-btn" data-i18n-title="channel.open_list_title" title="Открыть список каналов">▾</button>
      <button id="channel-copy-btn" title="Путь недоступен">⧉</button>
      <button id="btn-copy-url" data-i18n-title="channel.copy_url_title" title="Скопировать ссылку на текущее время">#</button>
      <div class="topbar-spacer"></div>
      <div id="topbar-right">
        <span class="clock-part" id="clk-day">--</span>
        <span class="clock-sep">.</span>
        <span class="clock-part" id="clk-month">--</span>
        <span class="clock-sep">.</span>
        <span class="clock-part" id="clk-year">----</span>
        <span class="clock-sep ml">&#160;</span>
        <span class="clock-part" id="clk-h">--</span>
        <span class="clock-sep">:</span>
        <span class="clock-part" id="clk-m">--</span>
        <span class="clock-sep">:</span>
        <span class="clock-part" id="clk-s">--</span>
        <button id="btn-now" data-i18n-title="transport.go_now_title" title="Перейти к текущему времени">⟳</button>
      </div>
    </div>
  </div>

  <!-- ── Timeline rows ────────────────────────────────────────────── -->
  <div id="timeline-container">
    <canvas id="tl-seconds" class="tl-row" height="42"></canvas>
    <canvas id="tl-minutes" class="tl-row" height="42"></canvas>
    <canvas id="tl-hours"   class="tl-row" height="42"></canvas>
    <canvas id="tl-days"    class="tl-row" height="42"></canvas>
    <canvas id="tl-months"  class="tl-row" height="42"></canvas>
  </div>

  <!-- ── Transport controls ────────────────────────────────────────── -->
  <div id="transport">
    <div id="transport-left">
      <button id="btn-play"  class="btn-transport" data-i18n-title="transport.play_title" title="Воспроизвести / Пауза">▶</button>
      <button id="btn-mark-in"  class="btn-mark" data-i18n-title="transport.mark_in_title"  title="Установить начало фрагмента">In</button>
      <button id="btn-mark-out" class="btn-mark" data-i18n-title="transport.mark_out_title" title="Установить конец фрагмента">Out</button>
      <div id="sel-label"><span class="sel-empty">—</span></div>
      <span id="sel-warning" class="hidden"></span>
    </div>
    <div id="transport-right">
      <button id="btn-add-log" class="btn-action" data-i18n="transport.add_segment">Добавить фрагмент</button>
      <button id="btn-clear-sel" class="btn-danger" data-i18n="transport.clear_selection">Очистить выделение</button>
    </div>
  </div>

  <!-- ── Index status bar ────────────────────────────────────────────── -->
  <div id="status-bar" class="status-scanning">
    <span id="status-icon">⏳</span>
    <span id="status-text" data-i18n="status.init">Инициализация…</span>
    <span id="status-detail"></span>
    <span id="play-loading" class="hidden" data-i18n="status.buffering">⌛ Буферизация…</span>
    <span id="status-close" data-i18n-title="btn.hide_title" title="Скрыть">✕</span>
  </div>

  <!-- ── Playlog status bar ──────────────────────────────────────── -->
  <div id="playlog-bar" class="hidden">
    <span id="plbar-icon"></span>
    <span id="plbar-text" data-i18n="playlog.checking">Проверка плейлогов…</span>
    <span id="plbar-detail"></span>
    <span id="plbar-close" data-i18n-title="btn.hide_title" title="Скрыть">✕</span>
  </div>

  <!-- ── Channel diagnostics popover ──────────────────────────────── -->
  <div id="diag-popover" class="hidden">
    <div id="diag-title" data-i18n="diag.title">Недоступные каналы</div>
    <div id="diag-list"></div>
  </div>

  <!-- ── Main columns ─────────────────────────────────────────────── -->
  <div id="main-columns">

    <!-- Playlist -->
    <div id="playlist-panel" class="panel">
      <div class="panel-header">
        <span data-i18n="panel.playlog">ПЛЕЙЛОГ</span>
      </div>
      <div id="playlist-list" class="scrollable-list"></div>
    </div>

    <!-- Log-list -->
    <div id="loglist-panel" class="panel">
      <div class="panel-header">
        <span data-i18n="panel.segments">ВЫБРАННЫЕ ФРАГМЕНТЫ</span>
        <div>
          <button id="btn-export-all" class="btn-green btn-sm" data-i18n="btn.download_all">Скачать всё</button>
          <button id="btn-clear-log"  class="btn-danger btn-sm" data-i18n="btn.clear">Очистить</button>
        </div>
      </div>
      <div id="loglist-items" class="scrollable-list"></div>
    </div>

  </div>

  <!-- ── Export modal ─────────────────────────────────────────────── -->
  <div id="export-modal" class="modal hidden">
    <div class="modal-box">
      <h3 data-i18n="export.title">Экспорт фрагмента</h3>
      <label><span data-i18n="export.format_label">Формат:</span>
        <select id="exp-format">
          <option value="mp3">MP3</option>
          <option value="wav">WAV PCM</option>
          <option value="aac">AAC</option>
        </select>
      </label>
      <label><span data-i18n="export.samplerate_label">Частота дискретизации:</span>
        <select id="exp-samplerate">
          <option value="32000">32 000 Гц</option>
          <option value="44100" selected>44 100 Гц</option>
          <option value="48000">48 000 Гц</option>
        </select>
      </label>
      <label id="exp-bitrate-row"><span data-i18n="export.bitrate_label">Битрейт:</span>
        <select id="exp-bitrate">
          <option value="320k">320 kbps</option>
          <option value="192k" selected>192 kbps</option>
          <option value="128k">128 kbps</option>
          <option value="64k">64 kbps</option>
        </select>
      </label>
      <div id="exp-wav-note"  class="hidden" style="font-size:11px;color:var(--text2)" data-i18n="export.wav_note">WAV экспортируется как PCM 16-bit без сжатия</div>
      <div id="exp-copy-note" class="hidden" style="font-size:11px;color:var(--accent2)" data-i18n="export.copy_note">⚡ Оригинальный формат канала — экспорт без перекодирования</div>
      <div id="export-progress" class="hidden"></div>
      <div class="modal-buttons">
        <button id="exp-ok"     class="btn-green" data-i18n="btn.export">Экспортировать</button>
        <button id="exp-cancel" class="btn-danger" data-i18n="btn.cancel">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Hidden audio element for playback -->
  <audio id="audio-player" preload="none"></audio>

</div>

<script src="/static/i18n.js"></script>
<script src="/static/timeline.js"></script>
<script src="/static/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Абрикос 2 — Вход</title>
  <link rel="icon" href="/static/apricot.svg" sizes="any" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ── */
    :root, [data-theme="light"] {
      --bg:          #f0f4fa;
      --card-bg:     #ffffff;
      --card-border: #d4dcea;
      --card-shadow: rgba(0,0,0,0.10);
      --text:        #1a2540;
      --label:       #6070a0;
      --hint:        #8090b8;
      --input-bg:    #f5f7fc;
      --input-brd:   #c8d4e8;
      --input-focus: #2BA2E0;
      --lang-brd:    #c8d4e8;
      --lang-clr:    #8090b8;
      --theme-btn:   #8090b8;
    }
    [data-theme="dark"] {
      --bg:          #0e1c38;
      --card-bg:     #122040;
      --card-border: #1e3268;
      --card-shadow: rgba(0,0,0,0.55);
      --text:        #e4e8f4;
      --label:       #7080a0;
      --hint:        #506080;
      --input-bg:    #1a3260;
      --input-brd:   #1e3268;
      --input-focus: #2BA2E0;
      --lang-brd:    #1e3268;
      --lang-clr:    #7080a0;
      --theme-btn:   #7080a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 44px 52px;
      width: 400px;
      box-shadow: 0 12px 40px var(--card-shadow);
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }

    .theme-toggle {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--theme-btn);
      line-height: 1;
      padding: 2px 4px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .theme-toggle:hover { opacity: 1; }

    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 36px;
    }
    .login-brand span {
      font-family: Impact, 'Arial Narrow', sans-serif;
      font-size: 44px;
      color: #E59346;
      letter-spacing: 0.05em;
    }

    .form-label {
      display: block;
      font-size: 11px;
      color: var(--label);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .form-group { margin-bottom: 18px; }

    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-brd);
      border-radius: 5px;
      color: var(--text);
      padding: 11px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, background 0.2s;
    }
    .form-input:focus { border-color: var(--input-focus); }

    .btn-login {
      width: 100%;
      background: #E59346;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: filter 0.15s;
      letter-spacing: 0.03em;
    }
    .btn-login:hover    { filter: brightness(1.1); }
    .btn-login:active   { filter: brightness(0.95); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }

    .hint {
      font-size: 11px;
      color: var(--hint);
      margin-top: 5px;
      line-height: 1.4;
    }
    .error-msg {
      min-height: 22px;
      margin-top: 14px;
      font-size: 13px;
      color: #BD3839;
      white-space: pre-line;
      line-height: 1.5;
    }

    .lang-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 22px;
    }
    .lang-btn {
      background: transparent;
      border: 1px solid var(--lang-brd);
      border-radius: 4px;
      color: var(--lang-clr);
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, color 0.15s;
    }
    .lang-btn:hover  { border-color: #E59346; color: #E59346; }
    .lang-btn.active { border-color: #E59346; color: #E59346; }
  </style>
</head>
<body>
<div class="login-card">
  <button class="theme-toggle" id="theme-toggle" title="Переключить тему">🌙</button>

  <div class="login-brand">
    <img src="/static/apricot.svg" width="54" height="54" alt="">
    <span>Абрикос 2</span>
  </div>

  <form id="login-form" autocomplete="on">
    <div class="form-group">
      <label class="form-label" for="username" data-i18n="login.username_label">Имя пользователя</label>
      <input id="username" class="form-input" type="text"
             autocomplete="username" autofocus spellcheck="false">
      <div class="hint" id="domain-hint" data-i18n-html="login.domain_hint">
        Доменные пользователи:<br>
        <strong>a.pushkin</strong> — поиск во всех настроенных доменах<br>
        <strong>CONTOSO\a.pushkin</strong> — явное указание домена (несколько доменов)<br>
        <strong>a.pushkin@contoso.local</strong> — по суффиксу UPN
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="password" data-i18n="login.password_label">Пароль</label>
      <input id="password" class="form-input" type="password"
             autocomplete="current-password">
    </div>
    <button id="btn-submit" class="btn-login" type="submit" data-i18n="login.submit">Войти</button>
    <div id="error-msg" class="error-msg"></div>
  </form>

  <div class="lang-row">
    <button class="lang-btn" data-lang="ru">RU</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="fr">FR</button>
  </div>

</div>
<script src="/static/i18n.js"></script>
<script>
// ── Theme ────────────────────────────────────────────────────────────────────
function _getLoginTheme() {
  try {
    const obj = JSON.parse(localStorage.getItem('apricot-theme') || 'null');
    if (obj && obj.until && Date.now() < obj.until) return obj.value;
  } catch (e) {}
  return 'light';   // default on login page
}

function _applyLoginTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'light' ? '🌙' : '☀️';
}

function _nextLoginTransition() {
  const now = new Date(), next = new Date(now);
  next.setSeconds(0); next.setMilliseconds(0);
  const h = now.getHours();
  if (h >= 9 && h < 18) { next.setHours(18, 0); }
  else if (h < 9)        { next.setHours(9, 0); }
  else                   { next.setDate(next.getDate() + 1); next.setHours(9, 0); }
  return next.getTime();
}

_applyLoginTheme(_getLoginTheme());

document.getElementById('theme-toggle').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  localStorage.setItem('apricot-theme', JSON.stringify({ value: newTheme, until: _nextLoginTransition() }));
  _applyLoginTheme(newTheme);
});

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await I18n.init();
  I18n.applyToDOM();
  _updateLangBtns();
  document.title = I18n.t('login.page_title');

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      await I18n.setLang(btn.dataset.lang);
      I18n.applyToDOM();
      _updateLangBtns();
      document.title = I18n.t('login.page_title');
    });
  });
});

function _updateLangBtns() {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === I18n.getLang());
  });
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('btn-submit');

  if (!username) { errEl.textContent = I18n.t('login.error_empty_username'); return; }

  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent  = I18n.t('login.submit_checking');

  try {
    const resp = await fetch('/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password }),
    });

    if (resp.ok) {
      const next = new URLSearchParams(location.search).get('next') || '/';
      location.href = next;
    } else {
      const data = await resp.json().catch(() => ({}));
      errEl.textContent = data.detail || I18n.t('login.error_wrong_credentials');
      btn.disabled = false;
      btn.textContent = I18n.t('login.submit');
      document.getElementById('password').select();
    }
  } catch {
    errEl.textContent = I18n.t('login.error_connection');
    btn.disabled = false;
    btn.textContent = I18n.t('login.submit');
  }
});
</script>
</body>
</html>

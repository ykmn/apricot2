# Global application settings
server:
  host: "0.0.0.0"
  port: 8765
  # Продолжительность cookie-сессии в секундах (по умолчанию 604800 = 7 дней)
  session_ttl: 604800
  # Минимальный уровень логов, выводимых в консоль: DEBUG / INFO / WARNING / ERROR
  log_screen: "DEBUG"
  # Минимальный уровень логов, записываемых в файл logs/YYYY-mm-dd.log
  log_file: "INFO"
  # HTTPS (опционально). Положите cert.pem и key.pem в папку ssl/ и включите:
  ssl:
    enabled: false
    cert: "ssl/cert.pem"   # путь относительно корня проекта
    key:  "ssl/key.pem"
    # При включённом HTTPS: автоматически поднимает HTTP-сервер на порту ниже,
    # который перенаправляет все запросы на HTTPS (301 redirect).
    # Установите 0 или удалите ключ, чтобы отключить редирект.
    http_redirect_port: 80

# How often to poll SMB shares for new/deleted files (seconds)
watcher:
  poll_interval: 20

# Export settings
# Аудиофайлы сохраняются в папку export/ в корне проекта (создаётся автоматически)
export:
  default_format: "mp3"
  default_bitrate: "192k"
  # Срок хранения готовых экспортированных файлов (дней). По истечении удаляются автоматически.
  retention_days: 3
  # Время суток для ежедневной очистки папки export (формат HH:MM)
  cleanup_time: "03:00"

# ffmpeg binary path (leave empty to use system PATH)
ffmpeg_path: "ffmpeg"

# UI settings
ui:
  # Timezone for display (e.g. "Europe/Moscow", "UTC")
  timezone: "Europe/Moscow"

# Update source — GitHub repository for checking new commits
update:
  repo_url: "https://github.com/ykmn/apricot2/"

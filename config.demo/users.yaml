# config/users.yaml
# Локальные пользователи Абрикоса (используются при Local: true в ldap.yaml)
#
# is_admin: true  — доступ к функциям управления (пересканирование, перезагрузка конфига, перезапуск)
# is_admin: false — только навигация, прослушивание и экспорт
#
# Хранение пароля:
#   password_pbkdf2: "<хэш>"  — рекомендуется; PBKDF2-SHA256, 600 000 итераций (OWASP 2023).
#                                Хэш генерируется через: python tools/hash_password.py
#   password: "<текст>"       — открытый текст (только для совместимости, не рекомендуется).

users:
  - username: admin
    password: adminPassword
    is_admin: true

  - username: user
    password: user
    is_admin: false

# config/users.yaml
# Локальные пользователи АБрикоса (используются при Local: true в ldap.yaml)
#
# is_admin: true  — доступ к функциям управления (пересканирование, перезагрузка конфига, перезапуск)
# is_admin: false — только навигация, прослушивание и экспорт

# Хранение пароля:
#   password_argon2: "<хэш>"  — рекомендуется; хэш генерируется через:
#                                 python tools/hash_password.py
#   password: "<текст>"       — открытый текст (устаревший способ, для обратной совместимости)
# Если заданы оба поля, используется password_argon2.

users:
  - username: admin
    password: adminPassword
    is_admin: true

  - username: user
    password: user
    is_admin: false
